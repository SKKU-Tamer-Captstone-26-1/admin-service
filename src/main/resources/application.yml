server:
  port: ${HTTP_PORT:8095}

grpc:
  server:
    port: 9095
    reflection:
      enabled: true
  client:
    auth-service:
      address: ${AUTH_SERVICE_ADDR:static://localhost:9091}
      negotiation-type: plaintext

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:ontheblock}}
    username: ${DB_USER:admin_user}
    password: ${DB_PASSWORD:admin_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: map_view
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
